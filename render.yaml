services:
  - type: web
    name: api-server
    runtime: node
    region: singapore
    buildCommand: npm install -g pnpm --prefix=$HOME/.npm-global && export PATH=$HOME/.npm-global/bin:$PATH && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
