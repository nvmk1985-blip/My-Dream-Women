name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/tamil-ai-chat/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    name: EAS APK Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies (workspace root)
        run: pnpm install --no-frozen-lockfile

      - name: Install EAS CLI
        run: pnpm add -g eas-cli

      - name: Build APK via EAS
        working-directory: artifacts/tamil-ai-chat
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --output ./build.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-girls-${{ github.event.inputs.profile || 'production' }}-${{ github.run_number }}.apk
          path: artifacts/tamil-ai-chat/build.apk
          retention-days: 30
          if-no-files-found: warn
