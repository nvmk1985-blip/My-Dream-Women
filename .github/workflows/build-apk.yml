name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125 cmake;3.22.1'

      - name: Install pnpm + EAS CLI
        run: npm install -g pnpm@10 eas-cli

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=$((61 + ${{ github.run_number }}))
          echo "Setting versionCode to $VERSION_CODE"
          node -e "
            const fs = require('fs');
            const p = 'artifacts/tamil-ai-chat/app.json';
            const j = JSON.parse(fs.readFileSync(p,'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('versionCode set to', j.expo.android.versionCode);
          "

      - name: Fetch custom app icon from Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "Checking for custom app icon in Cloudinary my-girls/app-icon/..."
          ICON_URL=$(curl -sf -u "$CLOUDINARY_API_KEY:$CLOUDINARY_API_SECRET" \
            "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/resources/image?prefix=my-girls/app-icon/&type=upload&max_results=1" \
            | node -e "
              const d=[];
              process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{
                try {
                  const r=JSON.parse(d.join(''));
                  const res=r.resources;
                  if(res&&res.length>0) console.log(res[0].secure_url);
                } catch(e){}
              });" 2>/dev/null || true)
          if [ -n "$ICON_URL" ]; then
            echo "Custom icon found: $ICON_URL"
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/icon.png
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/adaptive-icon.png
            echo "✅ icon.png + adaptive-icon.png replaced with custom icon"
          else
            echo "No custom icon found — using default icon"
          fi

      - name: Build APK (EAS local — no credits needed)
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          export EXPO_TOKEN=$(echo "$EXPO_TOKEN" | tr -d '[:space:]')
          echo "Token length: ${#EXPO_TOKEN}"
          eas whoami
          # Run build and capture output to find APK path
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee /tmp/build.log
          # EAS local build outputs APK path at end of log
          APK=$(grep -oE '/[^ ]+\.apk' /tmp/build.log | grep -v node_modules | tail -1)
          # Fallback: search common EAS output locations (exclude repo files)
          if [ -z "$APK" ] || [ ! -s "$APK" ]; then
            APK=$(find /tmp -name "*.apk" 2>/dev/null | grep -v node_modules | xargs ls -S 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ] || [ ! -s "$APK" ]; then
            APK=$(find /home/runner -name "*.apk" 2>/dev/null | grep -v "node_modules\|\.git\|public/" | xargs ls -S 2>/dev/null | head -1)
          fi
          echo "APK found: $APK"
          SIZE=$(stat -c%s "$APK" 2>/dev/null || echo 0)
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ APK too small ($SIZE bytes) — build may have failed"
            cat /tmp/build.log | tail -50
            exit 1
          fi
          echo "APK_FILE=$APK" >> $GITHUB_ENV
          ls -lh "$APK"

      - name: Publish direct APK via GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          cp "$APK_FILE" my-girls-v${{ github.run_number }}.apk
          gh release create "$TAG" \
            "my-girls-v${{ github.run_number }}.apk" \
            --title "My Girls — Build ${{ github.run_number }}" \
            --notes "Tamil AI Chat APK — direct install on Android. Build ${{ github.run_number }}." \
            --repo ${{ github.repository }}
          echo "============================================"
          echo "✅ DIRECT APK DOWNLOAD:"
          echo "https://github.com/${{ github.repository }}/releases/download/$TAG/my-girls-v${{ github.run_number }}.apk"
          echo "============================================"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
