name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125 cmake;3.22.1'

      - name: Install pnpm + EAS CLI
        run: npm install -g pnpm@10 eas-cli

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=$((61 + ${{ github.run_number }}))
          node -e "
            const fs = require('fs');
            const p = 'artifacts/tamil-ai-chat/app.json';
            const j = JSON.parse(fs.readFileSync(p,'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('versionCode set to', j.expo.android.versionCode);
          "

      - name: Link EAS project to current account
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          export EXPO_TOKEN=$(echo "$EXPO_TOKEN" | tr -d '[:space:]')
          echo "Logged in as: $(eas whoami)"
          # Remove old projectId so EAS links to current account
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('app.json','utf8'));
            if (j.expo.extra && j.expo.extra.eas) delete j.expo.extra.eas.projectId;
            fs.writeFileSync('app.json', JSON.stringify(j, null, 2));
            console.log('Cleared old projectId');
          "
          # Init/link under current account
          eas init --non-interactive 2>&1 || true
          echo "New app.json projectId:"
          node -e "const j=JSON.parse(require('fs').readFileSync('app.json','utf8'));console.log(j.expo?.extra?.eas?.projectId||'none');"

      - name: Fetch custom app icon from Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          ICON_URL=$(curl -sf -u "$CLOUDINARY_API_KEY:$CLOUDINARY_API_SECRET" \
            "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/resources/image?prefix=my-girls/app-icon/&type=upload&max_results=1" \
            | node -e "
              const d=[];process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{try{const r=JSON.parse(d.join(''));if(r.resources&&r.resources.length>0)console.log(r.resources[0].secure_url);}catch(e){}});
            " 2>/dev/null || true)
          if [ -n "$ICON_URL" ]; then
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/icon.png
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/adaptive-icon.png
            echo "✅ Custom icon applied"
          else
            echo "Using default icon"
          fi

      - name: Build APK (EAS local)
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          export EXPO_TOKEN=$(echo "$EXPO_TOKEN" | tr -d '[:space:]')
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee /tmp/build.log
          # Find APK — largest file wins
          APK=$(find /tmp /home/runner/work -name "*.apk" 2>/dev/null \
            | grep -v "node_modules\|\.git\|public/" \
            | while read f; do sz=$(stat -c%s "$f" 2>/dev/null||echo 0); echo "$sz $f"; done \
            | sort -rn | awk 'NR==1{print $2}')
          echo "APK: $APK"
          SIZE=$(stat -c%s "$APK" 2>/dev/null || echo 0)
          echo "SIZE: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "❌ Build failed — APK too small"
            tail -60 /tmp/build.log
            exit 1
          fi
          echo "APK_FILE=$APK" >> $GITHUB_ENV
          ls -lh "$APK"

      - name: Publish APK via GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          APK_NAME="my-girls-v${{ github.run_number }}.apk"
          cp "$APK_FILE" "$APK_NAME"
          gh release create "$TAG" "$APK_NAME" \
            --title "My Girls — Build ${{ github.run_number }}" \
            --notes "Direct install APK. Build ${{ github.run_number }}." \
            --repo ${{ github.repository }}
          echo "✅ DOWNLOAD: https://github.com/${{ github.repository }}/releases/download/$TAG/$APK_NAME"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
