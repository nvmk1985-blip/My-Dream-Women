name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=$((61 + ${{ github.run_number }}))
          node -e "
            const fs = require('fs');
            const p = 'artifacts/tamil-ai-chat/app.json';
            const j = JSON.parse(fs.readFileSync(p,'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('versionCode set to', j.expo.android.versionCode);
          "

      - name: Fetch custom app icon from Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          ICON_URL=$(curl -sf -u "$CLOUDINARY_API_KEY:$CLOUDINARY_API_SECRET" \
            "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/resources/image?prefix=my-girls/app-icon/&type=upload&max_results=1" \
            | node -e "
              const d=[];process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{try{const r=JSON.parse(d.join(''));if(r.resources&&r.resources.length>0)console.log(r.resources[0].secure_url);}catch(e){}});
            " 2>/dev/null || true)
          if [ -n "$ICON_URL" ]; then
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/icon.png
            curl -sL "$ICON_URL" -o artifacts/tamil-ai-chat/assets/images/adaptive-icon.png
            echo "✅ Custom icon applied"
          else
            echo "Using default icon"
          fi

      - name: Expo Prebuild (generate Android project)
        working-directory: artifacts/tamil-ai-chat
        env:
          EXPO_PUBLIC_API_URL: https://my-girls-1-5.onrender.com
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: |
          yes | npx expo prebuild --platform android --clean 2>&1 || true
          if [ ! -d android ]; then
            echo "❌ android/ directory not created — prebuild failed"
            exit 1
          fi
          echo "=== Android project generated ==="
          ls android/

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/my-girls-release.keystore \
            -alias my-girls \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mygirls123 \
            -keypass mygirls123 \
            -dname "CN=MyGirls, OU=App, O=MyGirls, L=Chennai, ST=TN, C=IN"
          echo "✅ Keystore generated"

      - name: Configure release signing in Gradle
        working-directory: artifacts/tamil-ai-chat/android
        run: |
          # Add signing config to gradle.properties
          cat >> gradle.properties << 'EOF'

          MYAPP_UPLOAD_STORE_FILE=/tmp/my-girls-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=my-girls
          MYAPP_UPLOAD_STORE_PASSWORD=mygirls123
          MYAPP_UPLOAD_KEY_PASSWORD=mygirls123
          EOF

          # Patch app/build.gradle to add signingConfigs
          node -e "
            const fs = require('fs');
            let g = fs.readFileSync('app/build.gradle', 'utf8');

            // Add signingConfigs block after 'android {'
            if (!g.includes('signingConfigs')) {
              g = g.replace(
                'android {',
                \`android {
              signingConfigs {
                  release {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }\`
              );
              // Set release build to use signingConfigs.release
              g = g.replace(
                /buildTypes \{[\s\S]*?release \{/,
                (m) => m + '\n                signingConfig signingConfigs.release'
              );
              fs.writeFileSync('app/build.gradle', g);
              console.log('✅ Signing config added to app/build.gradle');
            } else {
              console.log('Signing config already present');
            }
          "

      - name: Build Release APK with Gradle
        working-directory: artifacts/tamil-ai-chat/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/gradle.log
          echo "=== APK files found ==="
          find . -name "*.apk" | grep -v "node_modules\|\.git" | while read f; do
            sz=$(stat -c%s "$f" 2>/dev/null || echo 0)
            echo "$sz bytes — $f"
          done | sort -rn

      - name: Locate, validate and copy APK
        run: |
          APK=$(find artifacts/tamil-ai-chat/android/app/build/outputs/apk/release \
            -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find artifacts/tamil-ai-chat/android -name "*.apk" 2>/dev/null \
              | grep -v "node_modules\|\.git" \
              | while read f; do echo "$(stat -c%s "$f" 2>/dev/null||echo 0) $f"; done \
              | sort -rn | awk 'NR==1{print $2}')
          fi
          echo "APK found: $APK"
          SIZE=$(stat -c%s "$APK" 2>/dev/null || echo 0)
          echo "SIZE: $SIZE bytes"
          if [ -z "$APK" ] || [ "$SIZE" -lt 1000000 ]; then
            echo "❌ APK too small or not found (size: $SIZE bytes)"
            tail -100 /tmp/gradle.log
            exit 1
          fi
          echo "✅ APK ready: $(ls -lh "$APK")"
          APK_NAME="my-girls-v${{ github.run_number }}.apk"
          cp "$APK" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Publish APK via GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          echo "Publishing $APK_NAME as release $TAG"
          ls -lh "$APK_NAME"
          gh release create "$TAG" "$APK_NAME" \
            --title "My Girls — Build ${{ github.run_number }}" \
            --notes "Direct install APK (Release build). Build ${{ github.run_number }}." \
            --latest \
            --repo ${{ github.repository }}
          echo "✅ DOWNLOAD: https://github.com/${{ github.repository }}/releases/download/$TAG/$APK_NAME"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            /tmp/gradle.log
            artifacts/tamil-ai-chat/android/app/build/outputs/logs/
          retention-days: 7
